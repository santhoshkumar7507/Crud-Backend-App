services:
  - type: web
    name: crud-fastapi-backend
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: REDIS_URL
        sync: false

databases:
  - name: crud-redis
    region: singapore
    plan: free
    ipAllowList: []
